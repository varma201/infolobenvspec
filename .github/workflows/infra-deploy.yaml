name: OCI Infrastructure Deployment

on:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  TF_IN_AUTATION: "true"
  TF_INPUT: "false"
  TF_HTTP_UPDATE_METHOD: "PUT"

jobs:
  # -------------------------------------------------
  # DEV PLAN
  # -------------------------------------------------
  dev-plan:
    name: DEV Plan
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: envs

    env:
      TF_HTTP_ADDRESS: ${{ secrets.TF_HTTP_ADDRESS_DEV }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_wrapper: false

      - name: OpenTofu Format Check
        run: tofu fmt -check -recursive

      - name: Create terraform.tfvars
        shell: bash
        env:
          TFVARS_CONTENT: ${{ secrets.TFVARS_FILE }}
        run: |
          printf '%s' "$TFVARS_CONTENT" > terraform.tfvars
          chmod 600 terraform.tfvars

      - name: Create OCI private key
        shell: bash
        env:
          OCI_PRIVATE_KEY_CONTENT: ${{ secrets.OCI_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.oci
          printf '%s' "$OCI_PRIVATE_KEY_CONTENT" > ~/.oci/oci_api_key.pem
          chmod 600 ~/.oci/oci_api_key.pem

      - name: OpenTofu Init
        run: tofu init -reconfigure

      - name: OpenTofu Validate
        run: tofu validate

      - name: Create DEV Plan
        run: |
          tofu plan \
            -var="environment=dev" \
            -out=dev.tfplan

      - name: Show DEV Plan
        run: tofu show -no-color dev.tfplan

      - name: Upload DEV Plan
        uses: actions/upload-artifact@v4
        with:
          name: dev-tfplan
          path: envs/dev.tfplan
          retention-days: 1

  # -------------------------------------------------
  # DEV APPLY
  # -------------------------------------------------
  dev-apply:
    name: DEV Apply
    needs: dev-plan
    runs-on: ubuntu-latest
    environment: dev

    defaults:
      run:
        working-directory: envs

    env:
      TF_HTTP_ADDRESS: ${{ secrets.TF_HTTP_ADDRESS_DEV }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_wrapper: false

      - name: Create terraform.tfvars
        shell: bash
        env:
          TFVARS_CONTENT: ${{ secrets.TFVARS_FILE }}
        run: |
          printf '%s' "$TFVARS_CONTENT" > terraform.tfvars
          chmod 600 terraform.tfvars

      - name: Create OCI private key
        shell: bash
        env:
          OCI_PRIVATE_KEY_CONTENT: ${{ secrets.OCI_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.oci
          printf '%s' "$OCI_PRIVATE_KEY_CONTENT" > ~/.oci/oci_api_key.pem
          chmod 600 ~/.oci/oci_api_key.pem

      - name: OpenTofu Init
        run: tofu init -reconfigure

      - name: Download DEV Plan
        uses: actions/download-artifact@v4
        with:
          name: dev-tfplan
          path: envs

      - name: Apply DEV Plan
        run: tofu apply -auto-approve dev.tfplan

  # -------------------------------------------------
  # UAT PLAN
  # -------------------------------------------------
  uat-plan:
    name: UAT Plan
    needs: dev-apply
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: envs

    env:
      TF_HTTP_ADDRESS: ${{ secrets.TF_HTTP_ADDRESS_UAT }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_wrapper: false

      - name: Create terraform.tfvars
        shell: bash
        env:
          TFVARS_CONTENT: ${{ secrets.TFVARS_FILE }}
        run: |
          printf '%s' "$TFVARS_CONTENT" > terraform.tfvars
          chmod 600 terraform.tfvars

      - name: Create OCI private key
        shell: bash
        env:
          OCI_PRIVATE_KEY_CONTENT: ${{ secrets.OCI_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.oci
          printf '%s' "$OCI_PRIVATE_KEY_CONTENT" > ~/.oci/oci_api_key.pem
          chmod 600 ~/.oci/oci_api_key.pem

      - name: OpenTofu Init
        run: tofu init -reconfigure

      - name: OpenTofu Validate
        run: tofu validate

      - name: Create UAT Plan
        run: |
          tofu plan \
            -var="environment=uat" \
            -out=uat.tfplan

      - name: Show UAT Plan
        run: tofu show -no-color uat.tfplan

      - name: Upload UAT Plan
        uses: actions/upload-artifact@v4
        with:
          name: uat-tfplan
          path: envs/uat.tfplan
          retention-days: 1

  # -------------------------------------------------
  # UAT APPLY
  # -------------------------------------------------
  uat-apply:
    name: UAT Apply
    needs: uat-plan
    runs-on: ubuntu-latest
    environment: uat

    defaults:
      run:
        working-directory: envs

    env:
      TF_HTTP_ADDRESS: ${{ secrets.TF_HTTP_ADDRESS_UAT }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_wrapper: false

      - name: Create terraform.tfvars
        shell: bash
        env:
          TFVARS_CONTENT: ${{ secrets.TFVARS_FILE }}
        run: |
          printf '%s' "$TFVARS_CONTENT" > terraform.tfvars
          chmod 600 terraform.tfvars

      - name: Create OCI private key
        shell: bash
        env:
          OCI_PRIVATE_KEY_CONTENT: ${{ secrets.OCI_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.oci
          printf '%s' "$OCI_PRIVATE_KEY_CONTENT" > ~/.oci/oci_api_key.pem
          chmod 600 ~/.oci/oci_api_key.pem

      - name: OpenTofu Init
        run: tofu init -reconfigure

      - name: Download UAT Plan
        uses: actions/download-artifact@v4
        with:
          name: uat-tfplan
          path: envs

      - name: Apply UAT Plan
        run: tofu apply -auto-approve uat.tfplan

  # -------------------------------------------------
  # PROD PLAN
  # -------------------------------------------------
  prod-plan:
    name: PROD Plan
    needs: uat-apply
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: envs

    env:
