          chmod 600 terraform.tfvars

      - name: Create OCI private key
        shell: bash
        env:
          OCI_PRIVATE_KEY_CONTENT: ${{ secrets.OCI_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.oci
          printf '%s' "$OCI_PRIVATE_KEY_CONTENT" > ~/.oci/oci_api_key.pem
          chmod 600 ~/.oci/oci_api_key.pem

      - name: OpenTofu Init
        run: tofu init -reconfigure

      - name: Download PROD Plan
        uses: actions/download-artifact@v4
        with:
          name: prod-tfplan
          path: envs

      - name: Apply PROD Plan
        run: tofu apply -auto-approve prod.tfplan