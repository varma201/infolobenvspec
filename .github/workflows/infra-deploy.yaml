      - name: Show PROD Plan
        run: tofu show -no-color prod.tfplan

      - name: Upload PROD Plan
        uses: actions/upload-artifact@v4
        with:
          name: prod-tfplan
          path: envs/prod.tfplan
          retention-days: 1

  # -------------------------------------------------
  # PROD APPLY
  # -------------------------------------------------
  prod-apply:
