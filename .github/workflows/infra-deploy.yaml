name: OCI Infrastructure - DEV

on:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: oci-dev-infrastructure
  cancel-in-progress: false

env:
  TF_IN_AUTOMATION: "true"
  TF_INPUT: "false"

jobs:
  plan:
    name: DEV Plan
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: envs

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_wrapper: false

      - name: Create terraform.tfvars
        shell: bash
        env:
          TFVARS_CONTENT: ${{ secrets.TFVARS_FILE }}
        run: |
          printf '%s' "$TFVARS_CONTENT" > terraform.tfvars
          chmod 600 terraform.tfvars

      - name: Create OCI private key
        shell: bash
        env:
          OCI_PRIVATE_KEY_CONTENT: ${{ secrets.OCI_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.oci
          printf '%s' "$OCI_PRIVATE_KEY_CONTENT" > ~/.oci/oci_api_key.pem
          chmod 600 ~/.oci/oci_api_key.pem

      - name: OpenTofu Init
        run: tofu init -reconfigure

      - name: OpenTofu Format Check
        run: tofu fmt -check -recursive

      - name: OpenTofu Validate
        run: tofu validate

      - name: Create DEV Plan
        run: |
          tofu plan \
            -var="environment=dev" \
            -out=dev.tfplan

      - name: Show DEV Plan
        run: tofu show -no-color dev.tfplan

      - name: Upload DEV Plan
        uses: actions/upload-artifact@v4
        with:
          name: dev-tfplan
          path: envs/dev.tfplan
          retention-days: 1

  apply:
    name: DEV Apply
    needs: plan
    runs-on: ubuntu-latest

    environment: dev

    defaults:
      run:
        working-directory: envs

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_wrapper: false

      - name: Create terraform.tfvars
        shell: bash
        env:
          TFVARS_CONTENT: ${{ secrets.TFVARS_FILE }}
        run: |
          printf '%s' "$TFVARS_CONTENT" > terraform.tfvars
          chmod 600 terraform.tfvars

      - name: Create OCI private key
        shell: bash
        env:
          OCI_PRIVATE_KEY_CONTENT: ${{ secrets.OCI_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.oci
          printf '%s' "$OCI_PRIVATE_KEY_CONTENT" > ~/.oci/oci_api_key.pem
          chmod 600 ~/.oci/oci_api_key.pem

      - name: OpenTofu Init
        run: tofu init -reconfigure

      - name: Download DEV Plan
        uses: actions/download-artifact@v4
        with:
          name: dev-tfplan
          path: envs

      - name: Apply Approved DEV Plan
        run: tofu apply -auto-approve dev.tfplan